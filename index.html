<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Coral</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="apple-touch-icon" href="/img/icon.png">

    <style>
        /* Estética Minimalista All-Black */
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #171717;
            --border-color: #2a2a2a;
            --text-primary: #ededed;
            --text-secondary: #a0a0a0;
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            /* Mantém a cor escura como fallback */

            /* Adicione estas linhas abaixo para o background: */
            background-image: url('./img/bg.png');
            background-size: cover;
            /* Faz a imagem cobrir a tela toda */
            background-position: center;
            /* Centraliza a imagem */
            background-attachment: fixed;
            /* Deixa o fundo parado enquanto a tela rola */

            color: var(--text-primary);
            display: flex;
            justify-content: center;
        }

        /* No seu arquivo CSS */

        .container {
            width: 120%;
            max-width: 480px;
            min-height: 100vh;
            /* Aumente o padding superior para empurrar o conteúdo para baixo */
            padding: 240px 20px 24px 20px;
            /* Valor alterado de 24px para 140px */
            display: flex;
            flex-direction: column;
            /* Garante que o padding não afete a largura total */
            box-sizing: border-box;
            /* Opcional: se quiser centralizar o conteúdo na tela */
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* Card de Aviso */
        .alert-card {
            background-color: rgba(23, 23, 23, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 32px;
        }

        .alert-card p {
            font-size: 24px;
            color: var(--text-secondary);
        }

        .alert-card strong {
            display: block;
            color: var(--accent);
            font-size: 34px;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Botões e Links */
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background-color: rgba(23, 23, 23, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 20px;
            border-radius: 16px;
            font-size: 26px;
            font-weight: 500;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            text-decoration: none;
        }

        .btn:active {
            background-color: #222;
            transform: scale(0.98);
        }

        .btn-icon {
            opacity: 0.5;
            font-size: 20px;
        }

        /* Separador de seção */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 16px;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .section-divider span {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        /* Botão Play Back com destaque sutil */
        .btn-playback {
            background-color: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .btn-playback:active {
            background-color: rgba(255, 255, 255, 0.08);
        }

        /* Views (Telas) */
        .view {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view.active {
            display: block;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 26px;
            cursor: pointer;
            padding: 8px 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--accent);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Player Panel */
        .player-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 15, 0.97);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 16px 20px 36px;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
        }

        .player-panel.open {
            transform: translateY(0);
        }

        .player-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .player-now {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .player-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .player-close {
            background: rgba(255,255,255,0.08);
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .player-close:active {
            background: rgba(255,255,255,0.15);
        }

        .player-iframe {
            width: 100%;
            height: 120px;
            border: none;
            border-radius: 12px;
            background: #1a1a1a;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="alert-card" id="alert-card">
            <p id="alert-text"></p>
            <strong id="alert-songs"></strong>
        </div>

        <main id="view-home" class="view active">
            <h2 class="section-title" style="font-size: 16px; color: var(--text-secondary); text-align: center;">
                Selecione seu naipe</h2>
            <div id="naipes-list"></div>

            <div class="section-divider"><span>Playback</span></div>

            <button class="btn btn-playback" id="btn-playback" onclick="openPlayback()">
                🎶 Play Back <span class="btn-icon">›</span>
            </button>
        </main>

        <main id="view-songs" class="view">
            <button class="back-btn" onclick="goHome()">
                <span>‹‹‹‹‹</span> Trocar Naipe
            </button>
            <h2 id="voice-title" class="section-title">Naipe</h2>

            <div id="songs-list">
            </div>
        </main>

        <main id="view-playback" class="view">
            <button class="back-btn" onclick="goHome()">
                <span>‹‹‹‹‹</span> Voltar
            </button>
            <h2 class="section-title">🎶 Play Back</h2>
            <div id="playback-list"></div>
        </main>

        <!-- Player de Áudio -->
        <div class="player-panel" id="player-panel">
            <div class="player-header">
                <div>
                    <p class="player-now">▶ Tocando agora</p>
                    <p class="player-title" id="player-title"></p>
                </div>
                <button class="player-close" onclick="closePlayer()">✕</button>
            </div>
            <iframe class="player-iframe" id="player-iframe" src="" allow="autoplay"></iframe>
        </div>
    </div>

    <script>
        const DATA_URL = 'https://api.github.com/repos/AndreMasiero/northcoral/contents/data.json';
        const PLAYBACK_URL = 'https://raw.githubusercontent.com/AndreMasiero/northcoral/main/data-playback.json';

        const viewHome = document.getElementById('view-home');
        const viewSongs = document.getElementById('view-songs');
        const viewPlayback = document.getElementById('view-playback');
        const songsList = document.getElementById('songs-list');
        const voiceTitle = document.getElementById('voice-title');
        const naipesList = document.getElementById('naipes-list');
        const playbackList = document.getElementById('playback-list');

        const naipeLabels = {
            soprano: 'Soprano',
            contralto: 'Contralto',
            tenor: 'Tenor',
            baritono: 'Barítono'
        };

        async function init() {
            const meta = await fetch(DATA_URL, { cache: 'no-store' }).then(r => r.json());
            const appData = JSON.parse(decodeURIComponent(escape(atob(meta.content))));

            document.getElementById('alert-text').textContent = appData.data_ensaio;
            document.getElementById('alert-songs').textContent = appData.musica_para_ensaiar;

            naipesList.innerHTML = '';
            Object.keys(appData.naipes).forEach(key => {
                const label = naipeLabels[key] || key.charAt(0).toUpperCase() + key.slice(1);
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerHTML = `${label} <span class="btn-icon">›</span>`;
                btn.onclick = () => selectVoice(appData, key);
                naipesList.appendChild(btn);
            });

            const savedVoice = localStorage.getItem('userVoice');
            if (savedVoice && appData.naipes[savedVoice]) {
                selectVoice(appData, savedVoice);
            }
        }

        function selectVoice(appData, voiceKey) {
            localStorage.setItem('userVoice', voiceKey);
            const label = naipeLabels[voiceKey] || voiceKey.charAt(0).toUpperCase() + voiceKey.slice(1);
            voiceTitle.textContent = label;

            songsList.innerHTML = '';
            appData.naipes[voiceKey].forEach(song => {
                const a = document.createElement('a');
                a.href = song.url;
                a.className = 'btn';
                a.target = '_blank';
                a.innerHTML = `🎵 ${song.title} <span class="btn-icon">↗</span>`;
                songsList.appendChild(a);
            });

            viewHome.classList.remove('active');
            viewPlayback.classList.remove('active');
            viewSongs.classList.add('active');
        }

        async function openPlayback() {
            playbackList.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Carregando...</p>';
            viewHome.classList.remove('active');
            viewPlayback.classList.add('active');

            try {
                const pbData = await fetch(PLAYBACK_URL, { cache: 'no-store' }).then(r => r.json());

                playbackList.innerHTML = '';
                pbData.playback.forEach(song => {
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerHTML = `🎶 ${song.title} <span class="btn-icon">▶</span>`;
                    btn.onclick = () => playTrack(song);
                    playbackList.appendChild(btn);
                });
            } catch (e) {
                console.error('Erro ao carregar playback:', e);
                playbackList.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Erro ao carregar play back.</p>';
            }
        }

        function getEmbedUrl(url) {
            // Detecta URL de pasta (nao funciona para audio)
            if (url.includes('/drive/folders/')) return null;
            // https://drive.google.com/file/d/FILE_ID/view?...
            const fileMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (fileMatch) return `https://drive.google.com/file/d/${fileMatch[1]}/preview`;
            // https://drive.google.com/uc?id=FILE_ID
            const ucMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (ucMatch) return `https://drive.google.com/file/d/${ucMatch[1]}/preview`;
            return null;
        }

        function playTrack(song) {
            const embedUrl = getEmbedUrl(song.url);
            if (!embedUrl) {
                // URL de pasta: nao tem como tocar diretamente
                document.getElementById('player-title').textContent = song.title;
                document.getElementById('player-iframe').src = '';
                const panel = document.getElementById('player-panel');
                panel.classList.add('open');
                document.getElementById('player-iframe').style.display = 'none';
                let warn = document.getElementById('player-warn');
                if (!warn) {
                    warn = document.createElement('p');
                    warn.id = 'player-warn';
                    warn.style.cssText = 'color: var(--text-secondary); font-size: 13px; text-align: center; padding: 12px 0;';
                    panel.appendChild(warn);
                }
                warn.style.display = 'block';
                warn.textContent = '⚠️ Use o link do arquivo MP3 (não da pasta) no data-playback.json';
                return;
            }
            // Esconde aviso anterior
            const warn = document.getElementById('player-warn');
            if (warn) warn.style.display = 'none';
            document.getElementById('player-iframe').style.display = 'block';
            document.getElementById('player-title').textContent = song.title;
            document.getElementById('player-iframe').src = embedUrl;
            document.getElementById('player-panel').classList.add('open');
        }

        function closePlayer() {
            document.getElementById('player-panel').classList.remove('open');
            setTimeout(() => { document.getElementById('player-iframe').src = ''; }, 350);
        }

        function goHome() {
            localStorage.removeItem('userVoice');
            closePlayer();
            viewSongs.classList.remove('active');
            viewPlayback.classList.remove('active');
            viewHome.classList.add('active');
        }

        init();

        // --- Registro do Service Worker para o PWA ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Service Worker registrado com sucesso!', reg);
                }).catch(err => {
                    console.log('Falha ao registrar o Service Worker', err);
                });
            });
        }
    </script>
</body>

</html>
